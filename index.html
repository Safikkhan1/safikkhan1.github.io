
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safik Khan - Mountain Adventures</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>MountainPulse Adventures</h1>
    <p>Powered by Safik Khan | Explore the heights</p>
  </header>

  <main>
    <section class="tour">
      <h2>1. Climb Mt. Kazbek</h2>
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/S8Mt5L9vNzg" frameborder="0" allowfullscreen></iframe>
    </section>

    <section class="tour">
      <h2>2. Bazarduzu Blitz</h2>
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/XTQMOm7M0Co" frameborder="0" allowfullscreen></iframe>
    </section>

    <section class="tour">
      <h2>3. Svaneti Trek</h2>
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/EzxekI9qrs0" frameborder="0" allowfullscreen></iframe>
    </section>

    <section class="contact">
      <h2>Contact</h2>
      <form>
        <input type="text" placeholder="Name" required />
        <input type="email" placeholder="Email" required />
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Safik Khan Adventures</p>
  </footer>
</body>
</html>
